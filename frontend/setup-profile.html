<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoyaMate | Profile Setup</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .setup-card { background: white; padding: 2.5rem; border-radius: 24px; width: 100%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .interest-tag { padding: 8px 16px; border: 1px solid #e2e8f0; border-radius: 50px; cursor: pointer; font-size: 0.85rem; transition: 0.2s; background: #f8fafc; color: #475569; border: 1px solid #cbd5e1; }
        .interest-tag.selected { background: #2563eb; color: white; border-color: #2563eb; }
        .hidden { display: none; }
    </style>
</head>
<body style="background:#f8fafc; display:flex; justify-content:center; align-items:center; min-height:100vh; padding: 20px;">

    <div class="setup-card">
        <div style="width:60px; height:60px; background:#2563eb; border-radius:16px; display:flex; align-items:center; justify-content:center; margin:0 auto 1rem; color:white; font-size:1.5rem;">✈️</div>
        <h2 id="stepTitle" style="color: #1e293b; font-weight: 700;">Complete Your Profile</h2>
        <p id="stepSub" style="color: #64748b; font-size: 0.9rem; margin-bottom: 1.5rem;">Step 1 of 2 — Basic Info</p>
        
        <div style="height:4px; background:#e2e8f0; border-radius:10px; margin-bottom:2rem; overflow:hidden;">
            <div id="progressFill" style="height:100%; background:#2563eb; width:50%; transition:0.3s;"></div>
        </div>

        <div id="step1">
            <div style="text-align:left; margin-bottom:1.2rem;">
                <label style="display:block; font-size:0.8rem; font-weight:600; margin-bottom:0.5rem;">Full Name</label>
                <input type="text" id="setupName" placeholder="e.g. Vedanth" style="width:100%; padding:0.8rem; border-radius:10px; border:1px solid #e2e8f0;">
            </div>
            <div style="text-align:left; margin-bottom:1.2rem;">
                <label style="display:block; font-size:0.8rem; font-weight:600; margin-bottom:0.5rem;">Username</label>
                <input type="text" id="setupUser" placeholder="@voya_traveler" style="width:100%; padding:0.8rem; border-radius:10px; border:1px solid #e2e8f0;">
            </div>
            <div style="text-align:left; margin-bottom:1.2rem;">
                <label style="display:block; font-size:0.8rem; font-weight:600; margin-bottom:0.5rem;">Bio</label>
                <textarea id="setupBio" placeholder="What kind of traveler are you?" style="width:100%; padding:0.8rem; border-radius:10px; border:1px solid #e2e8f0; height:80px;"></textarea>
            </div>
            <button onclick="nextStep()" style="width:100%; padding:1rem; background:#2563eb; color:white; border:none; border-radius:12px; font-weight:700; cursor:pointer;">Continue →</button>
        </div>

        <div id="step2" class="hidden">
            <p style="font-weight: 600; margin-bottom: 1rem; text-align: left;">Pick at least 5 interests</p>
            <div id="interestsGrid" style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 2rem; max-height: 250px; overflow-y: auto; padding: 5px;">
                </div>
            <button id="finishBtn" onclick="finishSetup()" style="width:100%; padding:1rem; background:#1e293b; color:white; border:none; border-radius:12px; font-weight:700; cursor:pointer;">Finish Journey Setup</button>
        </div>
    </div>

    <script type="module" src="js/setup-profile.js"></script>
</body>
</html>
