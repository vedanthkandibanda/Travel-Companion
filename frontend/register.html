<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoyaMate | Join Now</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1e293b;
        }

        .register-container {
            width: 100%;
            background: white;
            padding: 2.5rem 1.5rem;
            text-align: center;
            position: relative;
        }

        /* Responsive Container for Tablet/Laptop */
        @media (min-width: 768px) {
            .register-container {
                max-width: 440px;
                border-radius: 32px;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); /* The shadow from your image */
                padding: 3rem;
            }
        }

        .back-arrow {
            position: absolute;
            top: 25px;
            left: 25px;
            cursor: pointer;
            font-size: 1.2rem;
            color: #64748b;
        }

        .icon-box {
            width: 60px;
            height: 60px;
            background: #2563eb; /* The specific blue from your image */
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: white;
            font-size: 1.5rem;
        }

        h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        .subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 2.5rem; }

        .input-group { text-align: left; margin-bottom: 1.5rem; }
        .input-group label { 
            display: block; 
            font-size: 0.8rem; 
            font-weight: 600; 
            margin-bottom: 0.5rem; 
            color: #1e293b; 
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: #fcfdfe;
            font-size: 0.95rem;
            transition: 0.2s;
        }

        input::placeholder { color: #cbd5e1; }
        input:focus { outline: none; border-color: #2563eb; background: white; }

        .create-btn {
            width: 100%;
            padding: 1rem;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2);
        }

        .login-link { margin-top: 1.5rem; font-size: 0.9rem; color: #64748b; }
        .login-link a { color: #2563eb; text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="back-arrow" onclick="window.location.href='login.html'">←</div>
        
        <div class="icon-box">✈️</div>
        <h2>Join VoyaMate</h2>
        <p class="subtitle">Start connecting at altitude</p>

        <form id="registerForm">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Alex Rivera" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>

            <div class="input-group" style="position: relative;">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
                <span style="position: absolute; right: 15px; top: 38px; cursor: pointer; opacity: 0.5;">👁️</span>
            </div>

            <button type="submit" class="create-btn">Create Account</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="login.html">Sign in</a>
        </div>
    </div>

    <div id="customAlert" style="display:none; position:fixed; top:20px; right:20px; background:#1e293b; color:white; padding:15px 25px; border-radius:12px; box-shadow:0 10px 15px rgba(0,0,0,0.2); z-index:9999;">
        <span id="alertMsg"></span>
    </div>

    <script type="module" src="js/register.js"></script>
</body>
</html>
