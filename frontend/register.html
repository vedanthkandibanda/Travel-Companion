<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoyaMate | Join Now</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background:#f8fafc; display:flex; justify-content:center; align-items:center; min-height:100vh;">

    <div class="register-container" style="background:white; padding:2.5rem; border-radius:16px; box-shadow:0 10px 25px rgba(0,0,0,0.05); width:100%; max-width:440px; text-align:center; position:relative;">
        <div onclick="window.location.href='login.html'" style="position:absolute; top:25px; left:25px; cursor:pointer; font-size:1.2rem; color:#64748b;">←</div>
        
        <div style="width:60px; height:60px; background:#2563eb; border-radius:16px; display:flex; align-items:center; justify-content:center; margin:0 auto 1.5rem; color:white; font-size:1.5rem;">✈️</div>
        <h2 style="font-weight:700; margin-bottom:0.5rem;">Join VoyaMate</h2>
        <p style="color:#64748b; font-size:0.9rem; margin-bottom:2.5rem;">Start connecting at altitude</p>

        <form id="registerForm" novalidate>
            <div style="text-align:left; margin-bottom:1.5rem;">
                <label style="display:block; font-size:0.8rem; font-weight:600; margin-bottom:0.5rem;">Full Name</label>
                <input type="text" id="name" placeholder="Alex Rivera" required style="width:100%; padding:0.8rem; border-radius:12px; border:1px solid #e2e8f0; background:#fcfdfe;">
            </div>
            <div style="text-align:left; margin-bottom:1.5rem;">
                <label style="display:block; font-size:0.8rem; font-weight:600; margin-bottom:0.5rem;">Email</label>
                <input type="email" id="email" placeholder="you@example.com" required style="width:100%; padding:0.8rem; border-radius:12px; border:1px solid #e2e8f0; background:#fcfdfe;">
            </div>
            <div style="text-align:left; margin-bottom:1.5rem;">
                <label style="display:block; font-size:0.8rem; font-weight:600; margin-bottom:0.5rem;">Password</label>
                <input type="password" id="password" placeholder="••••••••" required style="width:100%; padding:0.8rem; border-radius:12px; border:1px solid #e2e8f0; background:#fcfdfe;">
            </div>
            <button type="submit" style="width:100%; padding:1rem; background:#2563eb; color:white; border:none; border-radius:12px; font-weight:700; font-size:1rem; cursor:pointer; box-shadow:0 10px 15px rgba(37,99,235,0.2);">Create Account</button>
        </form>

        <div style="margin-top:1.5rem; font-size:0.9rem; color:#64748b;">
            Already have an account? <a href="login.html" style="color:#2563eb; text-decoration:none; font-weight:700;">Sign in</a>
        </div>
    </div>

    <script type="module" src="js/register.js"></script>
</body>
</html>
