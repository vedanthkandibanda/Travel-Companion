<!DOCTYPE html>
<html>
<head>
<title>Add Flight</title>
</head>

<body>

<h2>Add Your Flight</h2>

<form id="flightForm">

<input type="text" id="flight_number" placeholder="Flight Number" required><br><br>
<input type="text" id="departure_city" placeholder="Departure City" required><br><br>
<input type="text" id="arrival_city" placeholder="Arrival City" required><br><br>
<input type="date" id="departure_date" required><br><br>
<input type="time" id="departure_time" required><br><br>
<input type="text" id="seat_number" placeholder="Seat Number" required><br><br>

<button type="submit">Add Flight</button>

</form>

<script type="module">
import BASE_URL from "./js/config.js";

document.getElementById("flightForm").addEventListener("submit", async (e) => {

  e.preventDefault();

  const user_id = localStorage.getItem("userId");

  if (!user_id) {
    alert("Login first");
    return;
  }

  const data = {
    user_id,
    flight_number: flight_number.value,
    departure_city: departure_city.value,
    arrival_city: arrival_city.value,
    departure_date: departure_date.value,
    departure_time: departure_time.value,
    seat_number: seat_number.value
  };

  const res = await fetch(`${BASE_URL}/flights/add`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  });

  const result = await res.json();
  alert(result.message);

});
</script>

</body>
</html>
