<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoyaMate | Sign In</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background:#f3f4f6; display:flex; justify-content:center; align-items:center; min-height:100vh;">

    <div class="login-card" style="background:white; padding:2.5rem; border-radius:16px; box-shadow:0 10px 25px rgba(0,0,0,0.05); width:100%; max-width:420px; text-align:center;">
        <div style="width:70px; height:70px; background:#1a202c; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 1rem; color:white; font-size:1.5rem;">✈️</div>
        <h2 style="font-weight:700; margin-bottom:0.5rem;">Welcome to VoyaMate</h2>
        <p style="color:#718096; font-size:0.9rem; margin-bottom:2rem;">Sign in to continue</p>

        <form id="loginForm" novalidate>
            <div style="text-align:left; margin-bottom:1.2rem;">
                <label style="display:block; font-size:0.8rem; font-weight:600; margin-bottom:0.5rem;">Email</label>
                <input type="email" id="email" placeholder="you@example.com" required style="width:100%; padding:0.8rem; border-radius:8px; border:1px solid #e2e8f0; background:#f8fafc;">
            </div>
            <div style="text-align:left; margin-bottom:1.2rem;">
                <label style="display:block; font-size:0.8rem; font-weight:600; margin-bottom:0.5rem;">Password</label>
                <input type="password" id="password" placeholder="••••••••" required style="width:100%; padding:0.8rem; border-radius:8px; border:1px solid #e2e8f0; background:#f8fafc;">
            </div>
            <button type="submit" style="width:100%; padding:0.8rem; background:#1a202c; color:white; border:none; border-radius:8px; font-weight:600; cursor:pointer;">Sign in</button>
        </form>

        <div style="margin-top:1.5rem; font-size:0.85rem;">
            <p><a href="javascript:void(0)" onclick="document.getElementById('forgotModal').style.display='flex'" style="color:#4a5568; text-decoration:none;">Forgot password?</a></p>
            <p style="margin-top:10px;">Need an account? <a href="register.html" style="color:#2563eb; font-weight:700; text-decoration:none;">Sign up</a></p>
        </div>
    </div>

    <div id="forgotModal" class="modal-overlay">
        <div style="background:white; padding:2rem; border-radius:16px; width:100%; max-width:380px; position:relative;">
            <span onclick="document.getElementById('forgotModal').style.display='none'" style="position:absolute; top:15px; right:15px; cursor:pointer;">✕</span>
            <h3 style="margin-bottom:10px;">Reset Password</h3>
            <p style="font-size:0.85rem; color:#64748b; margin-bottom:1.5rem;">Enter your email to receive a reset link.</p>
            <input type="email" id="resetEmail" placeholder="you@example.com" style="width:100%; padding:0.8rem; border-radius:8px; border:1px solid #e2e8f0; margin-bottom:1rem;">
            <button onclick="handleReset()" style="width:100%; padding:0.8rem; background:#2563eb; color:white; border:none; border-radius:8px; font-weight:600; cursor:pointer;">Send Link</button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script type="module" src="js/config.js"></script>
    <script type="module" src="js/login.js"></script>
</body>
</html>
