<!DOCTYPE html>
<html>
<head>
  <title>Flight Group Chat</title>
  <style>
    body { margin: 0; font-family: sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; height: 100vh; }
    #title { padding: 15px; background: #1e293b; text-align: center; font-size: 16px; font-weight: bold; margin: 0; }
    #typingIndicator { padding: 0 15px; font-size: 12px; color: #94a3b8; height: 18px; background: #0f172a; }
    #chatBox { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
    .msg { padding: 10px 14px; border-radius: 14px; max-width: 65%; font-size: 14px; }
    .me { background: #2563eb; align-self: flex-end; border-bottom-right-radius: 2px; }
    .them { background: #1e293b; align-self: flex-start; border-bottom-left-radius: 2px; }
    #inputBox { display: flex; padding: 10px; background: #1e293b; }
    #msg { flex: 1; padding: 10px; border-radius: 8px; border: none; outline: none; }
    button { margin-left: 8px; padding: 10px 16px; border: none; border-radius: 8px; background: #2563eb; color: white; cursor: pointer; }
  </style>
</head>
<body>

<h2 id="title">✈️ Flight Chat</h2>
<div id="typingIndicator"></div>
<div id="chatBox"></div>

<div id="inputBox">
  <input id="msg" placeholder="Type message" autocomplete="off">
  <button id="sendBtn">Send</button>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const socket = io("https://travel-companion-y8fn.onrender.com");
const myId = Number(localStorage.getItem("userId"));
const myName = localStorage.getItem("userName") || "Someone"; // Fallback if name not saved
const flightNumber = String(localStorage.getItem("flightNumber")).trim();

const chatBox = document.getElementById("chatBox");
const msgInput = document.getElementById("msg");
const typingIndicator = document.getElementById("typingIndicator");

if (!flightNumber || !myId) {
  alert("Invalid access");
  window.location.href = "find-travelers.html";
}

socket.emit("joinFlight", flightNumber);
document.getElementById("title").innerText = `✈️ Flight ${flightNumber} Chat`;

// ==============================
// RENDER MESSAGE
// ==============================
function renderMessage(senderId, message, messageId, time) {
  if (document.getElementById(`fmsg-${messageId}`)) return; // Prevent duplicates

  const div = document.createElement("div");
  const isMe = senderId === myId;
  div.id = `fmsg-${messageId}`;
  div.className = `msg ${isMe ? "me" : "them"}`;

  const formattedTime = time ? new Date(time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : "";

  div.innerHTML = `
    <div style="word-wrap: break-word;">${message}</div>
    <div style="font-size:10px;color:#cbd5e1;display:flex;justify-content:flex-end;margin-top:4px;">
      ${formattedTime}
      ${isMe ? `<span id="status-${messageId}" style="margin-left:5px;">✓</span>` : ""}
    </div>
  `;

  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

// ==============================
// SOCKET EVENTS
// ==============================
socket.on("receiveFlightMessage", (data) => {
  if (data.flightNumber !== flightNumber) return;
  renderMessage(data.senderId, data.message, data.messageId, data.time);

  // TRIGGER GROUP NOTIFICATION
    if (data.senderId !== myId) {
        showNotification(`Flight ${flightNumber} Group`, data.message);
    }

  if (data.senderId === myId) {
    const tick = document.getElementById(`status-${data.messageId}`);
    if (tick) tick.innerText = "✓✓";
  }
});

socket.on("flightCount", (data) => {
  if (data.flightNumber !== flightNumber) return;
  document.getElementById("title").innerText = `✈️ Flight ${data.flightNumber} • 👥 ${data.count} online`;
});

// Group Typing Logic
let typingTimer;
msgInput.addEventListener("input", () => {
  socket.emit("flightTyping", { flightNumber, userName: myName });
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => {
    socket.emit("flightStopTyping", { flightNumber });
  }, 1500);
});

socket.on("flightTyping", (data) => { typingIndicator.innerText = `${data.userName} is typing...`; });
socket.on("flightStopTyping", () => { typingIndicator.innerText = ""; });

// ==============================
// SEND
// ==============================
function sendMessage() {
  const message = msgInput.value.trim();
  if (!message) return;

  const messageId = Date.now();
  socket.emit("sendFlightMessage", { senderId: myId, flightNumber, message, messageId });
  
  socket.emit("flightStopTyping", { flightNumber });
  msgInput.value = ""; 
}

document.getElementById("sendBtn").onclick = sendMessage;
msgInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });

</script>
</body>
</html>
