<!DOCTYPE html>
<html>
<head>
  <title>Flight Group Chat</title>
</head>

<body>

<h2 id="title">✈️ Flight Chat</h2>

<div id="chatBox" style="
  border:1px solid #ccc;
  height:300px;
  overflow:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
"></div>

<br>

<input id="msg" placeholder="Type message">
<button id="sendBtn">Send</button>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>

const socket = io("https://travel-companion-y8fn.onrender.com");

const myId = Number(localStorage.getItem("userId"));
const flightNumber = localStorage.getItem("flightNumber");

const chatBox = document.getElementById("chatBox");
const msgInput = document.getElementById("msg");

// 🚫 safety
if (!flightNumber || !myId) {
  alert("Invalid access");
  window.location.href = "find-travelers.html";
}

// ==============================
// ✈️ JOIN FLIGHT ROOM
// ==============================
socket.emit("joinFlight", {
  flightNumber,
  userId: myId
});

document.getElementById("title").innerText =
  `✈️ Flight ${flightNumber} Chat`;


// ==============================
// 🧱 RENDER MESSAGE
// ==============================
function renderMessage(senderId, message){

  const div = document.createElement("div");

  const isMe = senderId === myId;

  div.style.background = isMe ? "#d1e7ff" : "#eee";
  div.style.margin = "5px";
  div.style.padding = "8px";
  div.style.borderRadius = "6px";
  div.style.alignSelf = isMe ? "flex-end" : "flex-start";

  div.innerHTML = `<b>${isMe ? "You" : "User " + senderId}:</b> ${message}`;

  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}


// ==============================
// 📥 RECEIVE MESSAGE
// ==============================
socket.on("receiveFlightMessage", (data) => {
  renderMessage(data.senderId, data.message);
});


// ==============================
// 📤 SEND MESSAGE
// ==============================
function sendMessage(){

  const message = msgInput.value.trim();
  if (!message) return;

  // instant UI
  renderMessage(myId, message);

  socket.emit("sendFlightMessage", {
    senderId: myId,
    flightNumber,
    message
  });

  msgInput.value = "";
}

document.getElementById("sendBtn").onclick = sendMessage;


// ==============================
// 👥 LIVE COUNT
// ==============================
socket.on("flightCount", (data) => {
  document.getElementById("title").innerText =
    `✈️ Flight ${data.flightNumber} • 👥 ${data.count} online`;
});

</script>

</body>
</html>
