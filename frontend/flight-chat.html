<!DOCTYPE html>
<html>
<head>
  <title>Flight Group Chat</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #title {
      padding: 15px;
      background: #1e293b;
      text-align: center;
      font-size: 16px;
      font-weight: bold;
    }

    #chatBox {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      padding: 10px 14px;
      border-radius: 14px;
      max-width: 65%;
      font-size: 14px;
    }

    .me {
      background: #2563eb;
      align-self: flex-end;
    }

    .them {
      background: #1e293b;
      align-self: flex-start;
    }

    #inputBox {
      display: flex;
      padding: 10px;
      background: #1e293b;
    }

    #msg {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      margin-left: 8px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }
  </style>

</head>

<body>

<h2 id="title">✈️ Flight Chat</h2>

<div id="chatBox"></div>

<div id="inputBox">
  <input id="msg" placeholder="Type message">
  <button id="sendBtn">Send</button>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>

const socket = io("https://travel-companion-y8fn.onrender.com");

const myId = Number(localStorage.getItem("userId"));
const flightNumber = String(localStorage.getItem("flightNumber")).trim();

const chatBox = document.getElementById("chatBox");
const msgInput = document.getElementById("msg");

// safety
if (!flightNumber || !myId) {
  alert("Invalid access");
  window.location.href = "find-travelers.html";
}

// ✅ FIXED JOIN (CRITICAL)
socket.emit("joinFlight", flightNumber);

document.getElementById("title").innerText =
  `✈️ Flight ${flightNumber} Chat`;


// ==============================
// RENDER MESSAGE
// ==============================
function renderMessage(senderId, message, messageId, time){

  const div = document.createElement("div");
  const isMe = senderId === myId;

  div.className = `msg ${isMe ? "me" : "them"}`;

  div.innerHTML = `
    <div>${message}</div>
    <div style="font-size:10px;color:gray;display:flex;justify-content:flex-end;">
      ${time || ""}
      ${isMe ? `<span id="status-${messageId}" style="margin-left:5px;">✓</span>` : ""}
    </div>
  `;

  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}


// ==============================
// RECEIVE MESSAGE
// ==============================
socket.on("receiveFlightMessage", (data) => {

  if (data.flightNumber !== flightNumber) return;

  renderMessage(
  data.senderId,
  data.message,
  data.messageId,
  data.time
  ? new Date(data.time).toLocaleTimeString([], {
      hour: '2-digit',
      minute: '2-digit'
    })
  : new Date().toLocaleTimeString([], {
      hour: '2-digit',
      minute: '2-digit'
    })
);

  if (data.senderId === myId) {
    const tick = document.getElementById(`status-${data.messageId}`);
    if (tick) tick.innerText = "✓✓";
  }

});
// ==============================
// SEND MESSAGE
// ==============================
function sendMessage(){

  const message = msgInput.value.trim();
  if (!message) return;

  const messageId = Date.now();

  socket.emit("sendFlightMessage", {
    senderId: myId,
    flightNumber,
    message,
    messageId
  });

  msgInput.value = ""; // ✅ CLEAR INPUT
}

document.getElementById("sendBtn").onclick = sendMessage;


// ==============================
// LIVE COUNT
// ==============================
socket.on("flightCount", (data) => {

  if (data.flightNumber !== flightNumber) return;

  document.getElementById("title").innerText =
    `✈️ Flight ${data.flightNumber} • 👥 ${data.count} online`;

});

</script>

</body>
</html>
