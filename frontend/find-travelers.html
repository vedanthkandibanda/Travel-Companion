<!DOCTYPE html>
<html>
<head>
<title>Find Travelers</title>
</head>

<body>

<h2>Find Travelers On Your Flight</h2>

<input type="text" id="flightNumber" placeholder="Enter Flight Number">

<select id="filter">
  <option value="all">All</option>
  <option value="high">🔥 High</option>
  <option value="medium">⭐ Medium</option>
</select>

<button id="searchBtn">Search</button>

<div id="results"></div>

<script type="module">
import BASE_URL from "./js/config.js";

document.getElementById("searchBtn").addEventListener("click", findTravelers);

async function findTravelers(){

  const flight = document.getElementById("flightNumber").value;
  const userId = localStorage.getItem("userId");

  if (!userId) {
    alert("Login first");
    window.location.href = "login.html";
    return;
  }

  const res = await fetch(`${BASE_URL}/api/flights/matches/${flight}/${userId}`);
  const data = await res.json();

  if (!Array.isArray(data)) {
    alert("Server error");
    return;
  }

  let filtered = data;

  const filter = document.getElementById("filter").value;

  if (filter === "high") {
    filtered = data.filter(u => u.score >= 60);
  }

  if (filter === "medium") {
    filtered = data.filter(u => u.score >= 30);
  }

  results.innerHTML = "";

  if (filtered.length === 0) {
    results.innerHTML = "No travelers 😕";
    return;
  }

  filtered.forEach(user => {

    const div = document.createElement("div");

    div.innerHTML = `
      <h3>${user.name}</h3>
      <p>Match: ${user.score}%</p>
      <button onclick="connectUser(${user.id})">Connect</button>
    `;

    results.appendChild(div);
  });
}

window.connectUser = async (receiverId) => {

  const senderId = localStorage.getItem("userId");

  const res = await fetch(`${BASE_URL}/api/flights/connect`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ senderId, receiverId })
  });

  const data = await res.json();
  alert(data.message);
};

</script>

</body>
</html>
