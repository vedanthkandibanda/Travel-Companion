<!DOCTYPE html>
<html>
<head>
<title>Find Travelers</title>
</head>

<body>

<h2>Find Travelers On Your Flight</h2>

<input type="text" id="flightNumber" placeholder="Enter Flight Number">

<select id="filter">
  <option value="all">All</option>
  <option value="high">🔥 High</option>
  <option value="medium">⭐ Medium</option>
</select>

<button id="searchBtn">Search</button>

<button onclick="checkGroup('${flight}')">
  View Flight Group
</button>

<div id="results"></div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>

const socket = io("https://travel-companion-y8fn.onrender.com");

function checkGroup(flight){

  socket.emit("getFlightCount", flight);

  socket.on("flightCount", (data) => {

    if(data.flightNumber !== flight) return;

    const join = confirm(
      `✈️ Flight ${flight}\n👥 ${data.count} people already joined\n\nDo you want to join group chat?`
    );

    if (join) {
      localStorage.setItem("flightNumber", flight);
      window.location.href = "flight-chat.html";
    }

  });
}

document.getElementById("searchBtn").addEventListener("click", findTravelers);

async function findTravelers(){

  const flight = document.getElementById("flightNumber").value;
  const userId = localStorage.getItem("userId");

  if (!userId) {
    alert("Login first");
    window.location.href = "login.html";
    return;
  }

  const res = await fetch(`${BASE_URL}/flights/matches/${flight}/${userId}`);
  const data = await res.json();

  if (!Array.isArray(data)) {
    alert("Server error");
    return;
  }

  let filtered = data;

  const filter = document.getElementById("filter").value;

  if (filter === "high") {
    filtered = data.filter(u => u.score >= 60);
  }

  if (filter === "medium") {
    filtered = data.filter(u => u.score >= 30);
  }

  results.innerHTML = "";

  if (filtered.length === 0) {
    results.innerHTML = "No travelers 😕";
    return;
  }

  filtered.forEach(user => {

    const div = document.createElement("div");

    div.innerHTML = `
      <h3>${user.name}</h3>
      <p>Match: ${user.score}%</p>
      <button onclick="connectUser(${user.id})">Connect</button>
    `;

    results.appendChild(div);
  });
}

window.connectUser = async (receiverId) => {

  const senderId = localStorage.getItem("userId");

  const res = await fetch(`${BASE_URL}/flights/connect`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ senderId, receiverId })
  });

  const data = await res.json();
  alert(data.message);
};

</script>

</body>
</html>
