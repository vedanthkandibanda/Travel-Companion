<script type="module">
import BASE_URL from "./js/config.js";

const userId = localStorage.getItem("userId");

async function loadConnections(){

  const res = await fetch(`${BASE_URL}/api/flights/requests/${userId}`);
  const data = await res.json();

  requests.innerHTML = "";

  data.forEach(conn => {
    if (conn.status !== "pending") return;

    requests.innerHTML += `
      <div>
        ${conn.name}
        <button onclick="acceptRequest(${conn.id})">Accept</button>
      </div>
    `;
  });
}

async function acceptRequest(id){
  await fetch(`${BASE_URL}/api/flights/accept`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ connectionId:id })
  });
  loadConnections();
  loadAccepted();
}

window.openChat = (id) => {
  localStorage.setItem("chatUserId", id);
  window.location.href = "chat.html";
};

async function loadAccepted(){

  const res = await fetch(`${BASE_URL}/api/flights/connections/${userId}`);
  const data = await res.json();

  acceptedList.innerHTML = "";

  data.forEach(user => {
    acceptedList.innerHTML += `
      <div>
        ${user.name}
        <button onclick="openChat(${user.id})">Chat</button>
      </div>
    `;
  });
}

loadConnections();
loadAccepted();
</script>
