<body>

<h2>Dashboard</h2>

<a href="find-travelers.html">Find Travelers</a><br><br>

<h3>🔔 Notifications: <span id="notifCount">0</span></h3>

<button onclick="logout()">Logout</button>

<script type="module">
import BASE_URL from "./js/config.js";

function logout(){
  localStorage.clear();
  window.location.href = "login.html";
}

async function loadNotifications(){

  const userId = localStorage.getItem("userId");

  if (!userId) return;

  const res = await fetch(`${BASE_URL}/api/flights/unread/${userId}`);
  const data = await res.json();

  document.getElementById("notifCount").innerText = data.count || 0;
}

setInterval(loadNotifications, 5000);
loadNotifications();

window.logout = logout;
</script>

</body>
</html>
