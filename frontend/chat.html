<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
</head>

<body>

<h2>💬 Chat</h2>

<div id="chatBox" style="
  border:1px solid #ccc;
  height:300px;
  overflow:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
"></div>

<br>

<input id="msg" placeholder="Type message">
<button id="sendBtn">Send</button>

<div id="typing" style="font-size:12px;color:gray;"></div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>

const BASE_URL = "https://travel-companion-y8fn.onrender.com/api";
const socket = io("https://travel-companion-y8fn.onrender.com");

const chatBox = document.getElementById("chatBox");
const msgInput = document.getElementById("msg");

const myId = Number(localStorage.getItem("userId"));
const receiverId = Number(localStorage.getItem("chatUserId"));

// 🚫 safety check
if (!myId || !receiverId) {
  alert("Chat error. Please reconnect.");
}

// 🔥 JOIN ROOM
socket.emit("join", myId);


// ==============================
// 🎯 SINGLE RENDER FUNCTION
// ==============================
function renderMessage(sender_id, message, messageId, time) {

  const div = document.createElement("div");
  const isMe = Number(sender_id) === myId;

  div.style.background = isMe ? "#d1e7ff" : "#eee";
  div.style.margin = "5px";
  div.style.padding = "8px";
  div.style.borderRadius = "6px";
  div.style.maxWidth = "70%";
  div.style.alignSelf = isMe ? "flex-end" : "flex-start";

  div.innerHTML = `
    <div>${message}</div>
    <div style="font-size:10px;color:gray;display:flex;justify-content:flex-end;">
      ${time || ""}
      ${isMe ? `<span id="status-${messageId}" style="margin-left:5px;">✓</span>` : ""}
    </div>
  `;

  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}


// ==============================
// 📥 RECEIVE LIVE MESSAGE
// ==============================
socket.on("receiveMessage", (data) => {

  if (data.senderId !== receiverId && data.senderId !== myId) return;

  const formattedTime = data.time
  ? new Date(data.time).toLocaleTimeString([], {
      hour: '2-digit',
      minute: '2-digit'
    })
  : new Date().toLocaleTimeString([], {
      hour: '2-digit',
      minute: '2-digit'
    });

  renderMessage(
    data.senderId,
    data.message,
    data.messageId,
    formattedTime
  );

  // ✅ DOUBLE TICK FIX
  if (data.senderId === myId) {
    const tick = document.getElementById(`status-${data.messageId}`);
    if (tick) tick.innerText = "✓✓";
  }

  // 🔵 SEEN (when receiver gets message)
if (data.senderId !== myId) {
  socket.emit("seenMessage", {
    senderId: data.senderId,
    receiverId: myId,
    messageId: data.messageId
  });
}

});

socket.on("messageSeen", ({ messageId }) => {
  const tick = document.getElementById(`status-${messageId}`);
  if (tick) tick.innerText = "✓✓"; // later we make blue
});

let typingTimeout;

msgInput.addEventListener("input", () => {
  socket.emit("typing", { senderId: myId, receiverId });

  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    socket.emit("stopTyping", { senderId: myId, receiverId });
  }, 1000);
});

socket.on("typing", ({ senderId }) => {
  if (senderId === receiverId) {
    document.getElementById("typing").innerText = "Typing...";
  }
});

socket.on("stopTyping", ({ senderId }) => {
  if (senderId === receiverId) {
    document.getElementById("typing").innerText = "";
  }
});


// ==============================
// 📦 LOAD OLD MESSAGES
// ==============================
async function loadMessages() {

  try {

    const res = await fetch(`${BASE_URL}/flights/messages/${myId}/${receiverId}`);
    const data = await res.json();

    chatBox.innerHTML = "";

    if (!Array.isArray(data)) {
      chatBox.innerHTML = "Error loading messages ❌";
      return;
    }

    data
  .sort((a, b) => new Date(a.created_at) - new Date(b.created_at)) // ✅ ORDER
  .forEach(msg => {

    const formattedTime = msg.created_at
  ? new Date(msg.created_at).toLocaleTimeString([], {
      hour: '2-digit',
      minute: '2-digit'
    })
  : "";

    renderMessage(
      msg.sender_id,
      msg.message,
      msg.id,
      formattedTime
    );

  });

  } catch (err) {
    console.error(err);
    chatBox.innerHTML = "Server error ❌";
  }
}


// ==============================
// 📤 SEND MESSAGE
// ==============================
async function sendMessage() {

  const message = msgInput.value.trim();
  if (!message) return;

  const messageId = Date.now();

  // ❌ REMOVE instant render (prevents duplicate)
  // renderMessage(myId, message);

  try {
    await fetch(`${BASE_URL}/flights/message`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        senderId: myId,
        receiverId,
        message
      })
    });
  } catch (err) {
    console.error("DB Save Error:", err);
  }

  socket.emit("sendMessage", {
    senderId: myId,
    receiverId,
    message,
    messageId
  });

  msgInput.value = ""; // ✅ CLEAR INPUT
}


// ==============================
// 🎯 BUTTON + ENTER KEY
// ==============================
document.getElementById("sendBtn").onclick = sendMessage;

msgInput.addEventListener("keypress", (e) => {
  if (e.key === "Enter") sendMessage();
});


// ==============================
// 🚀 INIT
// ==============================
loadMessages();

</script>

</body>
</html>
