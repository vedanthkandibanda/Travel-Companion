<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  
    <style>
  .tick { color: gray; margin-left: 5px; font-weight: bold; }
  .tick.seen { color: #34b7f1 !important; } /* WhatsApp Blue */
  
  .message-bubble.me { background: #dcf8c6; align-self: flex-end; }
  .message-bubble.them { background: #fff; align-self: flex-start; }

    body { font-family: sans-serif; margin: 0; padding: 20px; background: #f4f4f9; }
    h2 { margin-top: 0; }
    #chatBox { border:1px solid #ccc; height:300px; overflow-y:auto; padding:10px; display:flex; flex-direction:column; background: white; border-radius: 8px; }
    #typingIndicator { font-size: 12px; color: #888; height: 15px; margin-bottom: 5px; font-style: italic; }
    .input-area { display: flex; margin-top: 10px; gap: 10px; }
    #msg { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #ccc; }
    #sendBtn { padding: 10px 20px; border: none; background: #007bff; color: white; border-radius: 6px; cursor: pointer; }
    .tick { margin-left:5px; font-weight: bold; }
    .seen { color: #34b7f1; /* WhatsApp blue */ } 
  </style>
</head>
<body>

<h2>💬 Private Chat</h2>
<div id="typingIndicator"></div>
<div id="typingIndicator" style="font-size: 12px; color: #888; height: 18px; margin-left: 10px; font-style: italic;"></div>
<div id="chatBox"></div>

<div class="input-area">
  <input id="msg" placeholder="Type a message..." autocomplete="off">
  <button id="sendBtn">Send</button>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const BASE_URL = "https://travel-companion-y8fn.onrender.com/api";
const socket = io("https://travel-companion-y8fn.onrender.com");

const chatBox = document.getElementById("chatBox");
const msgInput = document.getElementById("msg");
const typingIndicator = document.getElementById("typingIndicator");

const myId = Number(localStorage.getItem("userId"));
const receiverId = Number(localStorage.getItem("chatUserId"));

if (!myId || !receiverId) {
  alert("Chat error. Please reconnect.");
  window.location.href = "connections.html";
}

// JOIN ROOM
socket.emit("join", myId);

// ==============================
// RENDER MESSAGE
// ==============================
// Add this CSS to your <style> tag at the top of chat.html
/* .tick { color: gray; margin-left: 5px; font-weight: bold; transition: color 0.3s; }
  .tick.seen { color: #34b7f1; } 
*/

function renderMessage(sender_id, message, messageId, time, status = "sent") {
  if (document.getElementById(`msg-${messageId}`)) return;

  const div = document.createElement("div");
  const isMe = Number(sender_id) === myId;
  div.id = `msg-${messageId}`;
  
  // Apply classes for side-by-side bubbles
  div.style.display = "flex";
  div.style.flexDirection = "column";
  div.style.padding = "8px 12px";
  div.style.margin = "5px 0";
  div.style.borderRadius = "8px";
  div.style.maxWidth = "70%";
  div.style.background = isMe ? "#dcf8c6" : "#fff";
  div.style.alignSelf = isMe ? "flex-end" : "flex-start";

  // Check if status from DB is 'seen'
  const isBlue = (status === "seen") ? "seen" : "";

  div.innerHTML = `
    <div>${message}</div>
    <div style="font-size:10px; color:gray; display:flex; justify-content:flex-end; margin-top:4px;">
      ${time || ""}
      ${isMe ? `<span id="status-${messageId}" class="tick ${isBlue}">✓✓</span>` : ""}
    </div>
  `;

  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;

  // NEW: If I (the receiver) just rendered a message from "them", 
  // tell the server I have seen it.
  if (!isMe && messageId) {
    socket.emit("messageSeen", { messageId, senderId: receiverId, receiverId: myId });
  }
}

// ==============================
// SOCKET EVENTS
// ==============================
socket.on("receiveMessage", (data) => {
  if (data.senderId !== receiverId && data.senderId !== myId) return;
  renderMessage(data.senderId, data.message, data.messageId, data.time, "✓✓");
});

socket.on("messageSent", (data) => {
  // Update tick to double tick when server confirms
  renderMessage(data.senderId, data.message, data.messageId, data.time, "✓✓");
});

socket.on("messageSeen", (data) => {
  const tick = document.getElementById(`status-${data.messageId}`);
  if (tick) {
    tick.innerText = "✓✓";
    tick.classList.add("seen"); // Turns blue
  }
});

// ==============================
// TYPING INDICATOR LOGIC
// ==============================
let typingTimer;
msgInput.addEventListener("input", () => {
  socket.emit("typing", { senderId: myId, receiverId });
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => {
    socket.emit("stopTyping", { senderId: myId, receiverId });
  }, 1500);
});

socket.on("typing", (data) => {
  if (data.senderId === receiverId) typingIndicator.innerText = "Typing...";
});

socket.on("stopTyping", (data) => {
  if (data.senderId === receiverId) typingIndicator.innerText = "";
});

// ==============================
// SEND & LOAD
// ==============================
async function sendMessage() {
  const message = msgInput.value.trim();
  if (!message) return;

  const messageId = Date.now();
  const tempTime = new Date().toISOString();

  // Optimistic render (1 tick)
  renderMessage(myId, message, messageId, tempTime, "✓");
  msgInput.value = ""; 
  socket.emit("stopTyping", { senderId: myId, receiverId });

  try {
    await fetch(`${BASE_URL}/flights/message`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ senderId: myId, receiverId, message })
    });
  } catch (err) { console.error("DB Save Error:", err); }

  socket.emit("sendMessage", { senderId: myId, receiverId, message, messageId });
}

// ==============================
// 🔔 NOTIFICATION SYSTEM
// ==============================

// Request permission as soon as the chat starts
if (Notification.permission !== "granted" && Notification.permission !== "denied") {
    Notification.requestPermission();
}

function showNotification(senderName, messageText) {
    // Only show if the user is NOT looking at the chat tab
    if (document.hidden && Notification.permission === "granted") {
        const notification = new Notification(`New Message from ${senderName}`, {
            body: messageText,
            icon: "https://cdn-icons-png.flaticon.com/512/733/733585.png", // Standard chat icon
            badge: "https://cdn-icons-png.flaticon.com/512/733/733585.png"
        });

        // Clicking the notification brings the user back to the tab
        notification.onclick = () => {
            window.focus();
            notification.close();
        };
    }
}

// ==============================
// UPDATE RECEIVE MESSAGE
// ==============================
// Replace lines 198-207 in chat.html with this:
socket.on("receiveMessage", (data) => {
    console.log("New message received:", data);

    // 1. TRIGGER THE NOTIFICATION
    // We show it if the user is on another tab (document.hidden)
    if (document.hidden && data.senderId !== myId) {
        showNotification("Travel Companion", data.message);
    }
    
    // 2. RENDER THE BUBBLE
    // Only show the message on screen if it's part of the current conversation
    if (data.senderId === receiverId || data.senderId === myId) {
        renderMessage(data.senderId, data.message, data.time);
    }
});
socket.on("updateTickToSeen", ({ messageId }) => {
    const tick = document.getElementById(`status-${messageId}`);
    if (tick) {
        tick.classList.add("seen"); // This triggers the Blue color
    }
});

async function loadMessages() {
  try {
    const res = await fetch(`${BASE_URL}/flights/messages/${myId}/${receiverId}`);
    const data = await res.json();
    
    chatBox.innerHTML = "";
    if (!Array.isArray(data)) return;

    // SORT BY ID or TIMESTAMP to ensure correct order
    data.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

    data.forEach(msg => {
      // Pass the actual status from the Database
      renderMessage(msg.sender_id, msg.message, msg.id, msg.created_at, msg.status);
    });
  } catch (err) {
    console.error("Error loading messages:", err);
  }
}
// Add this listener to catch real-time "seen" updates
socket.on("updateTickToSeen", ({ messageId }) => {
    const tick = document.getElementById(`status-${messageId}`);
    if (tick) {
        tick.style.color = "#34b7f1"; // Turn it Blue immediately
    }
});

document.getElementById("sendBtn").onclick = sendMessage;
msgInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });

loadMessages();
</script>
</body>
</html>
