<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
</head>
<body>

<h2>💬 Chat</h2>

<div id="chatBox" style="border:1px solid #ccc; height:300px; overflow:auto; padding:10px; display:flex; flex-direction:column;"></div>

<br>

<input id="msg" placeholder="Type message">
<button onclick="sendMessage()">Send</button>

<script>

const senderId = Number(localStorage.getItem("userId"));
const receiverId = Number(localStorage.getItem("chatUserId"));

// 🔥 DEBUG
console.log("Sender:", senderId, "Receiver:", receiverId);

// ✅ Load messages
async function loadMessages(){

  try {

    console.log("Sender:", senderId, "Receiver:", receiverId);

    const res = await fetch(`https://travel-companion-y8fn.onrender.com/api/flights/messages/${senderId}/${receiverId}`);

    const data = await res.json();

    console.log("DATA:", data);

    const chatBox = document.getElementById("chatBox");
    chatBox.innerHTML = "";

    if (!Array.isArray(data)) {
      chatBox.innerHTML = "Backend error ❌";
      return;
    }

    if (data.length === 0) {
      chatBox.innerHTML = "No messages yet 💬";
      return;
    }

    data.forEach(msg => {

      const div = document.createElement("div");

      const isMe = Number(msg.sender_id) === senderId;

      div.style.margin = "8px";
      div.style.padding = "8px";
      div.style.borderRadius = "8px";
      div.style.maxWidth = "60%";

      div.style.background = isMe ? "#d1e7ff" : "#eee";

      div.innerHTML = `
        <b>${isMe ? "You" : "Them"}:</b> ${msg.message}
      `;

      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;

  } catch (err) {
    console.error("ERROR:", err);
  }
}

// ✅ Send message
async function sendMessage(){

  const input = document.getElementById("msg");
  const message = input.value.trim();

  if (!message) return;

  try {
    await fetch("https://travel-companion-y8fn.onrender.com/api/flights/message", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        senderId,
        receiverId,
        message
      })
    });

    input.value = "";
    loadMessages();

  } catch (err) {
    console.error("SEND ERROR:", err);
  }
}

// ✅ Auto refresh
setInterval(loadMessages, 2000);

// ✅ Initial load
loadMessages();

</script>

</body>
</html>
