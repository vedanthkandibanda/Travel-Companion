<!DOCTYPE html>
<html>
<head>
<title>Chat</title>
</head>

<body>

<h2>💬 Chat</h2>

<div id="chatBox" style="border:1px solid #ccc;height:300px;overflow:auto;padding:10px;display:flex;flex-direction:column;"></div>

<br>

<input id="msg" placeholder="Type message">
<button id="sendBtn">Send</button>

<script type="module">
import BASE_URL from "./js/config.js";

const senderId = Number(localStorage.getItem("userId"));
const receiverId = Number(localStorage.getItem("chatUserId"));

if (!senderId || !receiverId) {
  alert("Invalid chat session");
}

async function loadMessages(){

  const res = await fetch(`${BASE_URL}/api/flights/messages/${senderId}/${receiverId}`);
  const data = await res.json();

  const chatBox = document.getElementById("chatBox");
  chatBox.innerHTML = "";

  if (!Array.isArray(data) || data.length === 0) {
    chatBox.innerHTML = "No messages 💬";
    return;
  }

  data.forEach(msg => {

    const div = document.createElement("div");
    const isMe = Number(msg.sender_id) === senderId;

    div.style.background = isMe ? "#d1e7ff" : "#eee";
    div.style.margin = "5px";
    div.style.padding = "8px";
    div.style.borderRadius = "8px";
    div.style.alignSelf = isMe ? "flex-end" : "flex-start";

    div.innerHTML = `<b>${isMe ? "You" : "Them"}:</b> ${msg.message}`;

    chatBox.appendChild(div);
  });

  chatBox.scrollTop = chatBox.scrollHeight;
}

async function sendMessage(){

  const message = msg.value.trim();
  if (!message) return;

  await fetch(`${BASE_URL}/api/flights/message`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ senderId, receiverId, message })
  });

  msg.value = "";
  loadMessages();
}

document.getElementById("sendBtn").addEventListener("click", sendMessage);

setInterval(loadMessages, 2000);
loadMessages();

</script>

</body>
</html>
